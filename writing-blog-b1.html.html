<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Writing Blog — B1 English Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#F7F4EF;
  --surface:#FFFFFF;
  --surface2:#F1EDE5;
  --ink:#1A1714;
  --ink2:#4A4540;
  --ink3:#8C857C;
  --border:rgba(26,23,20,.1);
  --border2:rgba(26,23,20,.18);
  --teal:#0A7C71;
  --teal-bg:#D6F4F0;
  --teal-mid:#14B8A6;
  --amber:#B45309;
  --amber-bg:#FEF3C7;
  --violet:#6D28D9;
  --violet-bg:#EDE9FE;
  --coral:#C2410C;
  --coral-bg:#FFEDD5;
  --shadow:0 2px 16px rgba(26,23,20,.07);
  --shadow-md:0 6px 32px rgba(26,23,20,.11);
  --r:14px;
  --r-sm:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;}

/* ── HEADER ─────────────────────── */
header{
  background:var(--ink);color:#fff;
  padding:0 1.75rem;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 20px rgba(0,0,0,.25);
}
.logo{font-family:'DM Serif Display',serif;font-size:20px;letter-spacing:-.2px;}
.logo em{color:var(--teal-mid);font-style:italic;}
.hud{display:flex;align-items:center;gap:.9rem;flex-wrap:wrap;}
.streak-pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);
  border-radius:20px;padding:4px 12px;font-size:12.5px;font-weight:500;
}
.xp-wrap{display:flex;align-items:center;gap:8px;}
.lvl-badge{
  background:var(--teal-mid);color:var(--ink);
  font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.04em;
}
.xp-bar{width:110px;height:5px;background:rgba(255,255,255,.15);border-radius:10px;overflow:hidden;}
.xp-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--teal-mid),#34D399);border-radius:10px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.xp-txt{font-size:11px;color:rgba(255,255,255,.55);white-space:nowrap;}

/* ── LAYOUT ─────────────────────── */
#layout{display:flex;height:calc(100vh - 58px);}

/* ── SIDEBAR ─────────────────────── */
#sidebar{
  width:232px;min-width:232px;
  background:var(--surface);border-right:1px solid var(--border);
  overflow-y:auto;padding:1rem 0;
}
.sb-label{
  font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink3);padding:0 1rem .55rem;font-weight:600;
}
.topic-btn{
  display:flex;align-items:center;gap:9px;width:100%;border:none;background:none;cursor:pointer;
  padding:.55rem 1rem;font-family:'Outfit',sans-serif;font-size:13px;
  color:var(--ink2);text-align:left;transition:all .13s;position:relative;
}
.topic-btn:hover{background:var(--surface2);color:var(--ink);}
.topic-btn.active{background:var(--teal-bg);color:var(--teal);font-weight:600;}
.topic-btn.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--teal);border-radius:0 3px 3px 0;}
.t-icon{font-size:15px;width:20px;text-align:center;}
.t-done{margin-left:auto;color:var(--teal);font-size:13px;font-weight:700;}
.sb-prog{padding:.65rem 1rem;border-top:1px solid var(--border);margin-top:.5rem;}
.sb-prog-label{font-size:11px;color:var(--ink3);margin-bottom:5px;font-weight:500;}
.sb-prog-bar{height:4px;background:var(--surface2);border-radius:10px;overflow:hidden;}
.sb-prog-fill{height:100%;background:var(--teal-mid);border-radius:10px;transition:width .5s ease;}

/* ── MAIN ─────────────────────── */
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}

/* ── TOPIC HEADER ─────────────────────── */
#topic-header{
  padding:1.75rem 2.25rem 1.4rem;
  border-bottom:1px solid var(--border);
  background:var(--surface);
}
.t-eyebrow{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);font-weight:700;margin-bottom:.35rem;}
#topic-title{font-family:'DM Serif Display',serif;font-size:27px;color:var(--ink);line-height:1.2;}
#topic-sub{font-size:13px;color:var(--ink3);margin-top:4px;}

/* ── CONTENT ─────────────────────── */
#content{flex:1;padding:1.75rem 2.25rem;max-width:900px;}

/* ── STATS ROW ─────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem;}
.stat-card{background:var(--surface);border-radius:var(--r-sm);border:1px solid var(--border);padding:.8rem 1rem;text-align:center;}
.stat-num{font-family:'DM Serif Display',serif;font-size:24px;color:var(--ink);line-height:1;}
.stat-label{font-size:10px;color:var(--ink3);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}

/* ── TENSE TAGS ─────────────────────── */
.tense-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.4rem;}
.tense-tag{font-size:11.5px;padding:4px 13px;border-radius:20px;font-weight:600;letter-spacing:.02em;display:flex;align-items:center;gap:5px;}
.tag-present{background:var(--teal-bg);color:var(--teal);}
.tag-past{background:var(--amber-bg);color:var(--amber);}
.tag-cont{background:var(--coral-bg);color:var(--coral);}
.tag-perfect{background:var(--violet-bg);color:var(--violet);}
.tag-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}

/* ── EXAMPLE CARD ─────────────────────── */
.example-card{
  background:var(--surface);border-radius:var(--r);border:1px solid var(--border);
  box-shadow:var(--shadow);margin-bottom:1.25rem;overflow:hidden;
}
.ex-header{
  display:flex;align-items:center;gap:7px;
  padding:.6rem 1.2rem;background:var(--ink);color:#fff;
  font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
}
.ex-dot{width:8px;height:8px;border-radius:50%;}
.ex-body{
  padding:1.2rem 1.4rem;
  font-family:'DM Serif Display',serif;
  font-size:15.5px;line-height:2;
  color:var(--ink2);font-style:italic;
}
.ex-body b{font-style:normal;font-weight:700;}
.v-present{color:var(--teal);}
.v-past{color:var(--amber);}
.v-cont{color:var(--coral);}
.v-perfect{color:var(--violet);}

/* ── LEGEND ─────────────────────── */
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:1.4rem;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3);font-weight:500;}
.leg-dot{width:10px;height:10px;border-radius:50%;}

/* ── WRITE CARD ─────────────────────── */
.write-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:1.5rem;}
.wc-header{
  padding:.75rem 1.2rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.wc-title{font-size:13.5px;font-weight:600;color:var(--ink);}
.xp-badge{font-size:11.5px;background:var(--teal-bg);color:var(--teal);border-radius:20px;padding:3px 11px;font-weight:700;}
.prompt-strip{
  padding:.7rem 1.2rem;background:var(--surface2);
  font-size:13px;color:var(--ink2);line-height:1.65;
  border-bottom:1px solid var(--border);
}
.prompt-strip strong{color:var(--ink);font-weight:600;}
textarea#blog-entry{
  width:100%;border:none;outline:none;
  padding:1.1rem 1.3rem;
  font-family:'DM Serif Display',serif;
  font-size:16px;line-height:1.95;
  color:var(--ink);background:var(--surface);
  resize:vertical;min-height:210px;
}
textarea#blog-entry::placeholder{
  font-style:italic;color:var(--ink3);
  font-family:'Outfit',sans-serif;font-size:13px;
}
.wc-footer{
  padding:.8rem 1.2rem;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:10px;background:var(--bg);
}
.btn-submit{
  background:var(--teal);color:#fff;border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:13.5px;font-weight:600;
  padding:9px 22px;border-radius:var(--r-sm);
  display:flex;align-items:center;gap:7px;
  transition:all .15s;letter-spacing:.01em;
}
.btn-submit:hover{background:#0A6B61;transform:translateY(-1px);box-shadow:0 4px 14px rgba(10,124,113,.3);}
.btn-submit:active{transform:translateY(0);}
.btn-clear{
  background:none;border:1px solid var(--border2);
  font-family:'Outfit',sans-serif;font-size:13px;color:var(--ink3);
  cursor:pointer;padding:9px 15px;border-radius:var(--r-sm);transition:all .15s;
}
.btn-clear:hover{background:var(--surface2);color:var(--ink);}
.wc-count{margin-left:auto;font-size:12px;color:var(--ink3);font-weight:500;}
.wc-count span{color:var(--teal);font-weight:700;}

/* ── BADGES ─────────────────────── */
.badges-section{margin-bottom:2rem;}
.badges-title{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);font-weight:700;margin-bottom:.7rem;}
.badges-grid{display:flex;flex-wrap:wrap;gap:9px;}
.badge-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:.6rem .85rem;background:var(--surface);
  border-radius:var(--r-sm);border:1px solid var(--border);
  min-width:82px;transition:all .2s;cursor:default;
}
.badge-item.unlocked:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.badge-item.locked{opacity:.3;filter:grayscale(1);}
.b-emoji{font-size:22px;}
.b-name{font-size:10px;font-weight:600;color:var(--ink3);text-align:center;line-height:1.3;}

/* ── TOAST ─────────────────────── */
#toast{
  position:fixed;bottom:1.75rem;right:1.75rem;
  background:var(--ink);color:#fff;
  padding:.85rem 1.3rem;border-radius:var(--r);
  font-size:14px;font-weight:500;
  box-shadow:var(--shadow-md);
  transform:translateY(130%);opacity:0;
  transition:all .38s cubic-bezier(.34,1.56,.64,1);
  z-index:999;display:flex;align-items:center;gap:10px;max-width:310px;
}
#toast.show{transform:translateY(0);opacity:1;}
#toast-icon{font-size:20px;}

/* ── CONFETTI ─────────────────────── */
.piece{position:fixed;top:-12px;pointer-events:none;z-index:1000;animation:drop linear forwards;}
@keyframes drop{to{transform:translateY(110vh) rotate(800deg);opacity:0;}}

/* ── ANIMATE ─────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .32s ease both;}

/* ── SCROLL ─────────────────────── */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}

@media(max-width:660px){
  #sidebar{display:none;}
  #content,#topic-header{padding:1.1rem;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .hud .xp-wrap{display:none;}
}
</style>
</head>
<body>

<header>
  <div class="logo">My Writing <em>Blog</em> <span style="font-size:11px;opacity:.45;font-family:'Outfit',sans-serif;font-weight:400;margin-left:6px;">B1 Level</span></div>
  <div class="hud">
    <div class="streak-pill">🔥 <span id="streak-num">0</span> day streak</div>
    <div class="xp-wrap">
      <div class="lvl-badge" id="lvl">Lv 1</div>
      <div class="xp-bar"><div class="xp-fill" id="xp-fill"></div></div>
      <div class="xp-txt" id="xp-txt">0 / 100 XP</div>
    </div>
  </div>
</header>

<div id="layout">
  <nav id="sidebar">
    <p class="sb-label">Topics</p>
    <div id="topic-list"></div>
    <div class="sb-prog">
      <div class="sb-prog-label" id="sb-prog-label">0 / 15 completed</div>
      <div class="sb-prog-bar"><div class="sb-prog-fill" id="sb-prog-fill"></div></div>
    </div>
  </nav>
  <main id="main">
    <div id="topic-header">
      <div class="t-eyebrow">B1 English — Tense Practice</div>
      <div id="topic-title"></div>
      <div id="topic-sub"></div>
    </div>
    <div id="content"></div>
  </main>
</div>

<div id="toast"><span id="toast-icon">🎉</span><span id="toast-msg"></span></div>

<script>
/* ══════════════════════════════════════
   DATA — 15 TOPICS
══════════════════════════════════════ */
const TOPICS = [
  {
    id:"travel",icon:"✈️",name:"My travel experiences",
    sub:"Trips, destinations, adventures near and far",
    prompt:"Mix all four tenses: talk about your general travel habits <strong>(present)</strong>, describe what happened on a past trip <strong>(past simple)</strong>, say what you were doing at a specific moment <strong>(past continuous)</strong>, and mention places you have or haven't visited <strong>(present perfect)</strong>.",
    example:`I <b class="v-present">don't travel</b> every year, but when I do, I <b class="v-present">try</b> to make the most of it. Last summer I <b class="v-past">went</b> to Portugal. While I <b class="v-cont">was walking</b> through Lisbon's old streets, I <b class="v-past">got completely lost</b> — which <b class="v-past">turned out</b> to be the best part. I <b class="v-past">wasn't following</b> a map; I <b class="v-cont">was just wandering</b> and discovering tiny cafés and colourful tiles. I <b class="v-perfect">have been</b> to five countries so far. I <b class="v-perfect">haven't visited</b> Asia yet, but it's definitely on my list.`
  },
  {
    id:"career",icon:"💼",name:"My career journey",
    sub:"Jobs, studies, goals and professional growth",
    prompt:"Describe your current work or studies <strong>(present)</strong>, tell a story about something that happened <strong>(past simple)</strong>, set the scene for what was happening at a key moment <strong>(past continuous)</strong>, and reflect on what you have or haven't achieved <strong>(present perfect)</strong>.",
    example:`I <b class="v-present">work</b> as a junior designer and I <b class="v-present">love</b> it, even though I <b class="v-present">don't earn</b> much yet. It <b class="v-past">wasn't</b> always my plan. A few years ago, I <b class="v-past">was studying</b> law. While I <b class="v-cont">was preparing</b> for my second-year exams, I <b class="v-past">realised</b> I <b class="v-past">didn't want</b> to continue. I <b class="v-past">quit</b> and retrained completely. Since then, I <b class="v-perfect">have learned</b> so much. I <b class="v-perfect">have worked</b> on real projects for real clients, and I <b class="v-perfect">have never looked</b> back.`
  },
  {
    id:"movies",icon:"🎬",name:"Movies and series",
    sub:"Reviews, favourites and unforgettable moments",
    prompt:"Say what you usually watch <strong>(present)</strong>, describe a specific film or episode <strong>(past simple)</strong>, set the scene for a key moment <strong>(past continuous)</strong>, and mention things you have or haven't seen <strong>(present perfect)</strong>.",
    example:`I <b class="v-present">watch</b> at least one series a month. I <b class="v-present">don't enjoy</b> horror — it <b class="v-present">makes</b> me anxious. Last week I <b class="v-past">watched</b> a brilliant thriller. I <b class="v-past">wasn't expecting</b> the ending at all; while the detective <b class="v-cont">was explaining</b> the crime, the real suspect <b class="v-past">walked</b> through the door. My jaw <b class="v-past">dropped</b>. I <b class="v-perfect">have recommended</b> it to everyone I know. I <b class="v-perfect">haven't found</b> another series like it since.`
  },
  {
    id:"hobbies",icon:"🎨",name:"Hobbies and free time",
    sub:"What you love doing when you're not working",
    prompt:"Describe your current hobbies <strong>(present)</strong>, talk about a time you did an activity <strong>(past simple)</strong>, say what you were doing when something happened <strong>(past continuous)</strong>, and mention hobbies you have or haven't tried <strong>(present perfect)</strong>.",
    example:`I <b class="v-present">paint</b> watercolours every weekend — it <b class="v-present">helps</b> me relax. I <b class="v-present">don't consider</b> myself very talented, but I <b class="v-present">enjoy</b> the process. Last Saturday, while I <b class="v-cont">was painting</b> near the harbour, it <b class="v-past">started</b> to rain heavily. I <b class="v-past">wasn't carrying</b> an umbrella, so I <b class="v-past">ran</b> into a nearby café. The owner <b class="v-past">loved</b> my wet, half-finished painting and <b class="v-past">asked</b> to buy it! I <b class="v-perfect">have sold</b> three pieces now. I <b class="v-perfect">have never had</b> a proper exhibition yet, but maybe one day.`
  },
  {
    id:"food",icon:"🍽️",name:"Food and cooking",
    sub:"Recipes, restaurants and culinary adventures",
    prompt:"Talk about your eating habits <strong>(present)</strong>, describe a cooking or dining experience <strong>(past simple)</strong>, set the scene while it was happening <strong>(past continuous)</strong>, and mention dishes you have or haven't tried <strong>(present perfect)</strong>.",
    example:`I <b class="v-present">cook</b> most days and I <b class="v-present">try</b> to eat fresh food. I <b class="v-present">don't eat</b> meat, so I'm always <b class="v-present">looking</b> for creative vegetarian options. Last Sunday, while I <b class="v-cont">was making</b> a Thai curry, I <b class="v-past">knocked</b> the whole pot off the stove. It <b class="v-past">went</b> everywhere. I <b class="v-past">wasn't paying</b> attention because I <b class="v-cont">was watching</b> a video at the same time. I <b class="v-past">laughed</b>, cleaned up, and <b class="v-past">ordered</b> pizza. I <b class="v-perfect">have tried</b> food from over twenty countries. I <b class="v-perfect">haven't made</b> proper Japanese ramen yet — but I <b class="v-present">plan</b> to.`
  },
  {
    id:"family",icon:"👥",name:"Friends and family",
    sub:"The people who matter most in your life",
    prompt:"Describe your relationships now <strong>(present)</strong>, tell a story involving someone close to you <strong>(past simple)</strong>, set the atmosphere using background actions <strong>(past continuous)</strong>, and reflect on how long you've known people or what you've shared <strong>(present perfect)</strong>.",
    example:`My family <b class="v-present">lives</b> far away, but we <b class="v-present">talk</b> every Sunday. I <b class="v-present">don't see</b> them as often as I'd like. Last Christmas, while everyone <b class="v-cont">was eating</b> and the children <b class="v-cont">were playing</b> in the garden, my grandmother <b class="v-past">stood up</b> and <b class="v-past">announced</b> she <b class="v-past">was writing</b> her memoirs. We <b class="v-past">didn't know</b> anything about it. It <b class="v-past">was</b> the most wonderful surprise. I <b class="v-perfect">have always admired</b> her courage. We <b class="v-perfect">haven't read</b> the full manuscript yet — she's still writing!`
  },
  {
    id:"health",icon:"🏃",name:"Health and lifestyle",
    sub:"Routines, wellbeing, exercise and habits",
    prompt:"Describe your current health habits <strong>(present)</strong>, talk about a past experience related to health or exercise <strong>(past simple)</strong>, describe what was happening in the background <strong>(past continuous)</strong>, and mention changes you have or haven't made <strong>(present perfect)</strong>.",
    example:`I <b class="v-present">exercise</b> four times a week and I <b class="v-present">try</b> to sleep well. I <b class="v-present">don't drink</b> alcohol and I <b class="v-present">rarely eat</b> fast food. Last year I <b class="v-past">signed up</b> for a half marathon. While I <b class="v-cont">was training</b> in the park one morning, I <b class="v-past">twisted</b> my ankle badly. The doctor <b class="v-cont">was telling</b> me to rest for six weeks while I <b class="v-cont">was already planning</b> my comeback. I <b class="v-perfect">have finished</b> two races since then. I <b class="v-perfect">haven't broken</b> my personal best yet, but I'm getting closer.`
  },
  {
    id:"school",icon:"📚",name:"My school and study life",
    sub:"Classes, exams, teachers and learning experiences",
    prompt:"Describe your current studies <strong>(present)</strong>, tell a memorable school story <strong>(past simple)</strong>, describe what was happening at the time <strong>(past continuous)</strong>, and reflect on what you have learned so far <strong>(present perfect)</strong>.",
    example:`I <b class="v-present">study</b> English every day and I <b class="v-present">enjoy</b> it more than I expected. I <b class="v-present">don't find</b> grammar easy, but I <b class="v-present">keep</b> at it. Last semester, while I <b class="v-cont">was revising</b> for my oral exam, the electricity <b class="v-past">went</b> out. I <b class="v-past">wasn't sleeping</b> — it <b class="v-cont">was happening</b> at two in the morning. I <b class="v-past">had</b> to finish my notes by candlelight, which <b class="v-past">felt</b> surprisingly dramatic. I <b class="v-perfect">have passed</b> every exam so far. I <b class="v-perfect">haven't taken</b> an official Cambridge test yet, but that's my next goal.`
  },
  {
    id:"tech",icon:"💻",name:"Technology and social media",
    sub:"Gadgets, apps, habits and digital life",
    prompt:"Talk about how you use technology now <strong>(present)</strong>, describe a specific digital experience <strong>(past simple)</strong>, say what was happening at the time <strong>(past continuous)</strong>, and mention things you have or haven't tried <strong>(present perfect)</strong>.",
    example:`I <b class="v-present">use</b> my phone a lot. I <b class="v-present">don't post</b> on social media very often, but I <b class="v-present">scroll</b> for far too long. Last month, while I <b class="v-cont">was watching</b> a documentary about screen time, I <b class="v-past">decided</b> to do a week-long digital detox. I <b class="v-past">wasn't prepared</b> for how strange it <b class="v-past">felt</b>. On day three, while I <b class="v-cont">was reading</b> an actual book, I <b class="v-past">realised</b> how much I <b class="v-past">had missed</b> it. I <b class="v-perfect">have reduced</b> my screen time by half since then. I <b class="v-perfect">haven't deleted</b> all my apps, but I'm more mindful now.`
  },
  {
    id:"dreams",icon:"🌙",name:"Dreams and future plans",
    sub:"Ambitions, bucket lists and long-term goals",
    prompt:"Talk about your current dreams and plans <strong>(present)</strong>, describe a time you tried to achieve something <strong>(past simple)</strong>, say what was happening around that time <strong>(past continuous)</strong>, and reflect on what you have or haven't done yet toward your goals <strong>(present perfect)</strong>.",
    example:`I <b class="v-present">want</b> to live abroad for at least one year. I <b class="v-present">don't know</b> exactly when, but I <b class="v-present">think</b> about it constantly. A few years ago, I <b class="v-past">almost moved</b> to Berlin. While I <b class="v-cont">was looking</b> at apartments online, I <b class="v-past">got</b> a job offer back home. Everyone around me <b class="v-cont">was telling</b> me to stay. So I <b class="v-past">stayed</b> — but I <b class="v-present-v">haven't forgotten</b> the dream. I <b class="v-perfect">have started</b> saving money and I <b class="v-perfect">have been learning</b> German in my spare time. The plan <b class="v-present">is</b> still very much alive.`
  },
  {
    id:"childhood",icon:"🧸",name:"My childhood memories",
    sub:"Growing up, family moments and early experiences",
    prompt:"Talk about habits you had as a child <strong>(used to / simple past)</strong>, describe a specific childhood memory <strong>(past simple)</strong>, set the scene with background details <strong>(past continuous)</strong>, and reflect on how childhood has shaped who you are <strong>(present perfect)</strong>.",
    example:`When I <b class="v-past">was</b> young, I <b class="v-past">used to spend</b> every summer at my grandparents' farm. I <b class="v-past">didn't have</b> a phone or tablet — just the outdoors and my imagination. One afternoon, while my grandmother <b class="v-cont">was baking</b> in the kitchen and my grandfather <b class="v-cont">was sleeping</b> in his armchair, I <b class="v-past">found</b> a box of old photographs in the attic. I <b class="v-past">wasn't supposed</b> to be up there, but curiosity <b class="v-past">won</b>. Those photos <b class="v-perfect">have stayed</b> with me ever since. They <b class="v-perfect">have taught</b> me how important it is to document the ordinary moments of life.`
  },
  {
    id:"culture",icon:"🎭",name:"Art, music and culture",
    sub:"Concerts, exhibitions, books and creative experiences",
    prompt:"Describe your current cultural tastes <strong>(present)</strong>, tell a story about an event or experience <strong>(past simple)</strong>, describe what was happening at the time <strong>(past continuous)</strong>, and mention cultural things you have or haven't experienced <strong>(present perfect)</strong>.",
    example:`I <b class="v-present">love</b> live music. I <b class="v-present">try</b> to go to at least one concert a month and I <b class="v-present">don't usually care</b> about the genre. Last spring, while I <b class="v-cont">was waiting</b> in a long queue outside a jazz club, it <b class="v-past">started</b> to pour with rain. Nobody <b class="v-past">moved</b>. Everyone <b class="v-cont">was laughing</b> and sharing umbrellas with strangers. When the doors finally <b class="v-past">opened</b>, the atmosphere <b class="v-past">was</b> electric. I <b class="v-perfect">have been</b> to over forty concerts in my life. I <b class="v-perfect">have never seen</b> a live opera, though — and I <b class="v-present">think</b> it's time to change that.`
  },
  {
    id:"environment",icon:"🌿",name:"The environment and nature",
    sub:"Eco habits, outdoor experiences and the natural world",
    prompt:"Describe your current eco-habits or relationship with nature <strong>(present)</strong>, tell a story about a nature experience <strong>(past simple)</strong>, set the scene with background details <strong>(past continuous)</strong>, and reflect on what has changed or what you have done for the environment <strong>(present perfect)</strong>.",
    example:`I <b class="v-present">try</b> to live sustainably. I <b class="v-present">don't use</b> single-use plastic and I <b class="v-present">cycle</b> instead of driving. Last autumn, while I <b class="v-cont">was hiking</b> in the mountains, I <b class="v-past">came across</b> a large pile of rubbish left by other visitors. Some people <b class="v-cont">were walking</b> past it without a second glance. I <b class="v-past">stopped</b>, <b class="v-past">pulled out</b> a bag, and <b class="v-past">started</b> collecting it. Three other hikers <b class="v-past">joined</b> me. I <b class="v-perfect">have become</b> much more aware of environmental issues over the past few years. I <b class="v-perfect">haven't gone</b> completely zero-waste yet, but every small step <b class="v-present">counts</b>.`
  },
  {
    id:"travel2",icon:"🏙️",name:"City life vs country life",
    sub:"Where you live, what you prefer, and why",
    prompt:"Talk about your current living situation and preferences <strong>(present)</strong>, describe an experience in a city or rural area <strong>(past simple)</strong>, say what was happening around you at the time <strong>(past continuous)</strong>, and reflect on places you have or haven't lived <strong>(present perfect)</strong>.",
    example:`I <b class="v-present">live</b> in a city and I <b class="v-present">love</b> the energy, but I <b class="v-present">don't think</b> I want to stay here forever. Two summers ago, I <b class="v-past">rented</b> a small cottage in the countryside for a month. While the birds <b class="v-cont">were singing</b> outside my window every morning and the neighbours <b class="v-cont">were working</b> in their gardens, I <b class="v-past">felt</b> completely at peace. I <b class="v-past">didn't miss</b> the city noise at all. I <b class="v-perfect">have lived</b> in three different cities in my life. I <b class="v-perfect">have never owned</b> a garden, and maybe that's why I <b class="v-present">dream</b> about one so often.`
  },
  {
    id:"challenges",icon:"⚡",name:"Challenges and achievements",
    sub:"Difficult moments, lessons learned and personal growth",
    prompt:"Describe a challenge you currently face <strong>(present)</strong>, tell the story of a past difficulty and how you handled it <strong>(past simple)</strong>, describe the circumstances around it <strong>(past continuous)</strong>, and reflect on what it taught you or how you've grown <strong>(present perfect)</strong>.",
    example:`I <b class="v-present">find</b> it hard to say no to people. I <b class="v-present">don't always set</b> clear limits, and I sometimes <b class="v-present">end up</b> exhausted. A few years ago, while I <b class="v-cont">was working</b> on three big projects at the same time, I <b class="v-past">burned out</b> completely. My body <b class="v-cont">was telling</b> me to stop, but I <b class="v-past">wasn't listening</b>. One day I simply <b class="v-past">couldn't get</b> out of bed. That <b class="v-past">was</b> a real wake-up call. Since then, I <b class="v-perfect">have learned</b> to say no when I need to. I <b class="v-perfect">have also started</b> meditating — something I <b class="v-perfect">have never taken</b> seriously before but now <b class="v-present">swear</b> by.`
  }
];

/* ══════════════════════════════════════
   BADGES
══════════════════════════════════════ */
const BADGES = [
  {id:"first",  e:"✍️", n:"First Entry",     d:"Write your first entry"},
  {id:"w75",    e:"📝", n:"75 Words",         d:"Write 75+ words in one entry"},
  {id:"w150",   e:"📖", n:"150 Words",        d:"Write 150+ words in one entry"},
  {id:"t3",     e:"🗺️",n:"Explorer",         d:"Try 3 different topics"},
  {id:"t7",     e:"🌍", n:"Globe Trotter",    d:"Try 7 different topics"},
  {id:"t15",    e:"🏆", n:"Blog Master",      d:"Complete all 15 topics"},
  {id:"str3",   e:"🔥", n:"On Fire",          d:"3-day writing streak"},
  {id:"str7",   e:"⚡", n:"Unstoppable",      d:"7-day writing streak"},
  {id:"xp300",  e:"⭐", n:"Rising Star",      d:"Reach 300 XP"},
  {id:"xp750",  e:"💎", n:"Diamond Writer",   d:"Reach 750 XP"},
  {id:"cont",   e:"🎭", n:"Scene Setter",     d:"Use past continuous in an entry"},
  {id:"all4",   e:"🌈", n:"Tense Master",     d:"Use all 4 tenses in one entry"}
];

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let S = JSON.parse(localStorage.getItem("wb_b1")||"null") || {
  xp:0, level:1, streak:0, lastDate:null,
  done:[], badges:[], visited:[], totalWords:0, entries:0
};
let cur = TOPICS[0];

function save(){ localStorage.setItem("wb_b1", JSON.stringify(S)); }

/* ══════════════════════════════════════
   STREAK
══════════════════════════════════════ */
function updateStreak(){
  const today = new Date().toDateString();
  if(S.lastDate===today) return;
  const yest  = new Date(Date.now()-86400000).toDateString();
  S.streak = S.lastDate===yest ? S.streak+1 : 1;
  S.lastDate = today;
  save();
}

/* ══════════════════════════════════════
   XP / LEVEL
══════════════════════════════════════ */
function addXP(n){
  S.xp += n;
  const cap = S.level * 120;
  if(S.xp >= cap){ S.xp -= cap; S.level++; showToast("🎊","Level up! You're now Level "+S.level); confetti(); }
  save(); renderHUD();
}

function renderHUD(){
  document.getElementById("streak-num").textContent = S.streak;
  document.getElementById("lvl").textContent = "Lv "+S.level;
  const cap = S.level*120;
  document.getElementById("xp-fill").style.width = Math.min(100,Math.round(S.xp/cap*100))+"%";
  document.getElementById("xp-txt").textContent = S.xp+" / "+cap+" XP";
}

/* ══════════════════════════════════════
   BADGE CHECKING
══════════════════════════════════════ */
function checkBadges(wc, text){
  const earn=[];
  const maybe=(id,cond)=>{ if(cond&&!S.badges.includes(id)){S.badges.push(id);earn.push(id);} };
  maybe("first", S.entries>=1);
  maybe("w75",   wc>=75);
  maybe("w150",  wc>=150);
  maybe("t3",    S.visited.length>=3);
  maybe("t7",    S.visited.length>=7);
  maybe("t15",   S.done.length>=15);
  maybe("str3",  S.streak>=3);
  maybe("str7",  S.streak>=7);
  maybe("xp300", S.xp>=300);
  maybe("xp750", S.xp>=750);
  // detect past continuous
  const hasCont = /\b(was|were)\s+\w+ing\b/i.test(text);
  maybe("cont",  hasCont);
  // detect all 4 tenses heuristically
  const hasPres = /\b(don't|doesn't|do|does|love|work|think|feel|want|try|use|enjoy)\b/i.test(text);
  const hasPast = /\b(went|did|saw|had|made|got|took|said|told|came|left|bought|felt|found|knew|thought)\b/i.test(text);
  const hasPerf = /\b(have|has|haven't|hasn't)\s+\w+/i.test(text);
  maybe("all4",  hasPres&&hasPast&&hasCont&&hasPerf);

  if(earn.length){
    const b = BADGES.find(x=>x.id===earn[0]);
    if(b){ showToast(b.e, "Badge unlocked: "+b.n); confetti(); }
    save(); renderBadges();
  }
}

/* ══════════════════════════════════════
   RENDER BADGES
══════════════════════════════════════ */
function renderBadges(){
  const el=document.getElementById("badges-grid");
  if(!el)return;
  el.innerHTML=BADGES.map(b=>`
    <div class="badge-item ${S.badges.includes(b.id)?'unlocked':'locked'}" title="${b.d}">
      <span class="b-emoji">${b.e}</span>
      <span class="b-name">${b.n}</span>
    </div>`).join('');
}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
let _tt;
function showToast(icon,msg){
  document.getElementById("toast-icon").textContent=icon;
  document.getElementById("toast-msg").textContent=msg;
  const t=document.getElementById("toast");
  t.classList.add("show");
  clearTimeout(_tt);
  _tt=setTimeout(()=>t.classList.remove("show"),3400);
}

/* ══════════════════════════════════════
   CONFETTI
══════════════════════════════════════ */
function confetti(){
  const cols=["#14B8A6","#D97706","#7C3AED","#C2410C","#059669","#EC4899","#3B82F6"];
  for(let i=0;i<55;i++){
    const el=document.createElement("div");
    el.className="piece";
    const w=6+Math.random()*9, h=6+Math.random()*9;
    el.style.cssText=`left:${Math.random()*100}vw;width:${w}px;height:${h}px;
      background:${cols[i%cols.length]};
      animation-duration:${1.3+Math.random()*1.6}s;
      animation-delay:${Math.random()*.45}s;
      border-radius:${Math.random()>.5?'50%':'3px'}`;
    document.body.appendChild(el);
    el.addEventListener("animationend",()=>el.remove());
  }
}

/* ══════════════════════════════════════
   SIDEBAR
══════════════════════════════════════ */
function renderSidebar(){
  document.getElementById("topic-list").innerHTML=TOPICS.map(t=>`
    <button class="topic-btn ${t.id===cur.id?'active':''}" onclick="pick('${t.id}')">
      <span class="t-icon">${t.icon}</span>
      <span style="flex:1;text-align:left;">${t.name}</span>
      ${S.done.includes(t.id)?'<span class="t-done">✓</span>':''}
    </button>`).join('');
  const pct=Math.round(S.done.length/TOPICS.length*100);
  document.getElementById("sb-prog-label").textContent=`${S.done.length} / ${TOPICS.length} completed`;
  document.getElementById("sb-prog-fill").style.width=pct+"%";
}

/* ══════════════════════════════════════
   MAIN
══════════════════════════════════════ */
function renderMain(){
  document.getElementById("topic-title").textContent=cur.name;
  document.getElementById("topic-sub").textContent=cur.sub;

  document.getElementById("content").innerHTML=`
  <div class="fade-up">
    <div class="stats-row" style="margin-top:.2rem;">
      <div class="stat-card"><div class="stat-num">${S.entries}</div><div class="stat-label">Entries</div></div>
      <div class="stat-card"><div class="stat-num">${S.totalWords}</div><div class="stat-label">Total words</div></div>
      <div class="stat-card"><div class="stat-num">${S.done.length}</div><div class="stat-label">Topics done</div></div>
      <div class="stat-card"><div class="stat-num">${S.badges.length}</div><div class="stat-label">Badges</div></div>
    </div>

    <div class="tense-row">
      <span class="tense-tag tag-present"><span class="tag-dot" style="background:var(--teal);"></span>Simple present</span>
      <span class="tense-tag tag-past"><span class="tag-dot" style="background:var(--amber);"></span>Simple past</span>
      <span class="tense-tag tag-cont"><span class="tag-dot" style="background:var(--coral);"></span>Past continuous</span>
      <span class="tense-tag tag-perfect"><span class="tag-dot" style="background:var(--violet);"></span>Present perfect</span>
    </div>

    <div class="example-card">
      <div class="ex-header">
        <div class="ex-dot" style="background:var(--teal-mid);"></div>
        <div class="ex-dot" style="background:var(--amber);"></div>
        <div class="ex-dot" style="background:var(--coral);"></div>
        <div class="ex-dot" style="background:var(--violet);"></div>
        &nbsp;Example entry — read before writing yours
      </div>
      <div class="ex-body">${cur.example}</div>
    </div>

    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--teal);"></div>Simple present</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--amber);"></div>Simple past</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--coral);"></div>Past continuous</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--violet);"></div>Present perfect</div>
    </div>

    <div class="write-card">
      <div class="wc-header">
        <div class="wc-title">Your entry ✦</div>
        <div class="xp-badge">+XP for submitting</div>
      </div>
      <div class="prompt-strip">${cur.prompt}</div>
      <textarea id="blog-entry" placeholder="Start writing your entry here... mix all four tenses like the example above. Aim for at least 75 words!" oninput="onType()"></textarea>
      <div class="wc-footer">
        <button class="btn-submit" onclick="submit()">Submit entry ✦</button>
        <button class="btn-clear" onclick="clearIt()">Clear</button>
        <div class="wc-count">Words: <span id="wc">0</span></div>
      </div>
    </div>

    <div class="badges-section">
      <div class="badges-title">Badges — ${S.badges.length} / ${BADGES.length} unlocked</div>
      <div class="badges-grid" id="badges-grid"></div>
    </div>
  </div>`;
  renderBadges();
}

/* ══════════════════════════════════════
   INTERACTIONS
══════════════════════════════════════ */
function pick(id){
  cur=TOPICS.find(t=>t.id===id);
  if(!S.visited.includes(id)){S.visited.push(id);save();}
  renderSidebar(); renderMain();
  document.getElementById("main").scrollTo(0,0);
}

function wc(){
  const v=(document.getElementById("blog-entry")||{}).value||"";
  return v.trim()?v.trim().split(/\s+/).length:0;
}

function onType(){
  const el=document.getElementById("wc");
  if(el) el.textContent=wc();
}

function clearIt(){
  const ta=document.getElementById("blog-entry");
  if(ta){ta.value="";const el=document.getElementById("wc");if(el)el.textContent="0";}
}

function submit(){
  const ta=document.getElementById("blog-entry");
  if(!ta||!ta.value.trim()){if(ta)ta.focus();return;}
  const text=ta.value;
  const words=wc();
  const xpEarned=25+Math.floor(words/8);

  if(!S.done.includes(cur.id)) S.done.push(cur.id);
  S.totalWords+=words;
  S.entries++;
  updateStreak();
  addXP(xpEarned);
  checkBadges(words, text);
  save();
  renderSidebar();
  renderHUD();
  showToast("✨",`+${xpEarned} XP! Great writing — ${words} words!`);
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
updateStreak();
renderHUD();
renderSidebar();
renderMain();
</script>
</body>
</html>
